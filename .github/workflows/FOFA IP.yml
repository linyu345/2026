name: FOFA IP Update

on:
  schedule:
    - cron: "0 */2 * * *"          # 每 2 小时运行一次
  workflow_dispatch:                # 支持手动触发

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- 如果你以后要跑那个 PHP 扫描脚本，可以保留这一步 ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run fofa_fetch.py
        run: python py/fofa/fofa_fetch.py

      # --- 新增步骤：同步生成 M3U 文件 ---
      - name: Run txt_to_m3u.py
        run: |
          echo "=== 正在转换 IPTV.txt 为 IPTV.m3u ==="
          python py/fofa/txt_to_m3u.py || echo "转换脚本执行失败"

      - name: Pull latest changes (防冲突)
        run: |
          git fetch origin
          git pull origin main --rebase || git pull origin main --no-rebase || echo "pull 失败，继续尝试提交"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 主动清理不需要的文件
          rm -f py/fofa/zubo.txt || true
          git rm --cached py/fofa/zubo.txt || true

          # ★ 关键：添加所有生成的文件，包括新的 IPTV.m3u
          git add py/fofa/计数.txt           || true
          git add py/fofa/ip/*.txt           || true
          git add py/fofa/IPTV.txt           || true
          git add py/fofa/IPTV.m3u           || true

          echo "=== 当前 git status ==="
          git status --short

          if git diff --cached --quiet; then
            echo "⚠️ 没有实质变更，跳过 commit & push"
            exit 0
          fi

          COMMIT_MSG="自动更新：IPTV.txt & IPTV.m3u - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git commit -m "$COMMIT_MSG"
          git push origin HEAD:main --force-with-lease || echo "推送失败"

      - name: Display summary
        if: always()
        run: |
          echo "=== 运行总结 ==="
          [ -f py/fofa/IPTV.txt ] && echo "IPTV.txt 行数: $(wc -l < py/fofa/IPTV.txt)"
          [ -f py/fofa/IPTV.m3u ] && echo "IPTV.m3u 已生成 ✅" || echo "IPTV.m3u 生成失败 ❌"
