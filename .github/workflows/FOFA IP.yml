name: FOFA & Hotel Multi-Update

on:
  schedule:
    - cron: "*/15 * * * *"   # 每15分钟次 (Hotel)
  workflow_dispatch:               

jobs:
  unified-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp

      - name: Install ffmpeg (For Stream Check)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run FOFA Update
        run: python py/fofa/fofa_fetch.py

      - name: Run Hotel Update
        run: |
          python py/Hotel/hotel.py || echo "hotel.py skip"
          python py/Hotel/generate_hotel_m3u.py || echo "m3u skip"

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 强制清理可能冲突的临时文件
          rm -f py/fofa/zubo.txt || true
          git rm --cached py/fofa/zubo.txt || true

          # 添加所有可能更新的文件
          git add py/fofa/计数.txt
          git add py/fofa/ip/*.txt
          git add py/fofa/IPTV.txt
          git add py/fofa/IPTV.m3u
          git add "py/Hotel/hotel.txt" "py/Hotel/已检测ip.txt" "hotel.m3u"

          # 检查变更并提交
          if git diff --cached --quiet; then
            echo "⚠️ 无实质变更，跳过提交"
          else
            git commit -m "自动更新：FOFA(5倍数检测) & Hotel 数据 [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git pull origin main --rebase
            git push origin HEAD:main
          fi
