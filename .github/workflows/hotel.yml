name: Hotel IPTV Collect & M3U Generate

on:
  schedule:
    - cron: "0 1,17 * * *"   # 每天凌晨1点和下午5点运行
  workflow_dispatch:

jobs:
  run-hotel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5  # 升级到 v5，更稳定
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config pull.rebase false

      - name: Run hotel.py
        run: |
          echo "=== Starting hotel.py ==="
          python py/Hotel/hotel.py || echo "hotel.py 执行出错，继续后续步骤"
          echo "=== Finished hotel.py ==="

      - name: Generate M3U with Logos
        run: |
          echo "=== Starting generate_hotel_m3u.py ==="
          python py/Hotel/generate_hotel_m3u.py || echo "M3U 生成出错，继续后续"
          echo "=== Finished generate_hotel_m3u.py ==="

      - name: Pull latest changes (防止冲突)
        run: |
          git fetch origin
          git pull origin main --no-rebase || echo "pull 失败，继续..."

      - name: Check for changes & Commit/Push
        run: |
          # 添加所有可能变更的文件（包括 hotel.txt、已检测ip.txt、hotel.m3u）
          git add py/Hotel/hotel.txt py/Hotel/已检测ip.txt hotel.m3u || true

          # 调试：显示添加后状态
          echo "Git status after add:"
          git status

          git diff --cached --quiet
          if [ $? -eq 0 ]; then
            echo "⚠️ 无实质变更，跳过提交"
          else
            git commit -m "自动更新 hotel.txt / 已检测ip.txt / hotel.m3u $(date '+%Y-%m-%d %H:%M:%S 北京时间')"
            git push origin main || echo "推送失败（可能冲突或权限问题）"
          fi

      - name: Display results
        run: |
          echo "=== 运行结果总结 ==="
          if [ -f "py/Hotel/hotel.txt" ]; then
            hotel_lines=$(wc -l < py/Hotel/hotel.txt)
            echo "hotel.txt 行数: $hotel_lines"
          else
            echo "hotel.txt 未生成"
          fi

          if [ -f "py/Hotel/已检测ip.txt" ]; then
            ip_lines=$(wc -l < py/Hotel/已检测ip.txt)
            echo "已检测ip.txt 行数: $ip_lines"
            echo "=== 前10个合格IP ==="
            head -10 py/Hotel/已检测ip.txt || echo "文件为空"
          else
            echo "已检测ip.txt 未生成"
          fi

          if [ -f "hotel.m3u" ]; then
            m3u_lines=$(wc -l < hotel.m3u)
            echo "hotel.m3u 行数: $m3u_lines"
          else
            echo "hotel.m3u 未生成"
          fi
