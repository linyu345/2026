      - name: Commit and push if changed
        run: |
          set +e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 先拉取最新远程（避免冲突）
          git pull origin main --rebase || echo "pull 失败，继续尝试 push"

          # 添加文件
          git add py/fofa/IPTV.m3u || true
          git add py/fofa/txt_to_m3u.py || true

          echo "Git status after add:"
          git status

          git diff --cached --quiet
          if [ $? -eq 0 ]; then
            echo "⚠️ 无实质变更，跳过提交"
          else
            git commit -m "自动生成 IPTV.m3u $(date '+%Y-%m-%d %H:%M:%S 北京时间')"
            git push origin main || echo "推送失败（可能仍有冲突）"
          fi
