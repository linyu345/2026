name: Build IPTV.m3u from Remote IPTV.txt

on:
  schedule:
    - cron: '*/30 * * * *'          # 每 30 分钟运行一次
  workflow_dispatch:               # 支持手动触发

jobs:
  generate-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # 允许写入仓库

    steps:
      # 检出仓库（完整历史）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 requests（脚本依赖）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 运行转换脚本（假设脚本文件名为 txt_to_m3u.py，在仓库根目录）
      - name: Generate IPTV.m3u from remote IPTV.txt
        run: python txt_to_m3u.py

      # 调试信息
      - name: Debug - List files & git status
        run: |
          ls -la
          git status

      # 自动提交 & 推送（健壮版）
      - name: Commit and push changes if any
        run: |
          set +e   # 忽略非关键错误，继续执行

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 添加生成的文件
          git add IPTV.m3u txt_to_m3u.py || true

          # 检查是否有变更
          git diff --cached --quiet
          if [ $? -eq 0 ]; then
            echo "⚠️ 没有实质变更，跳过提交"
          else
            git commit -m "自动生成 IPTV.m3u $(date '+%Y-%m-%d %H:%M:%S 北京时间')"
            git push origin main || echo "推送失败（可能网络或权限问题）"
          fi
