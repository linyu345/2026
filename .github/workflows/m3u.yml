name: Build IPTV.m3u from Remote IPTV.txt

on:
  schedule:
    - cron: '*/30 * * * *'          # 每30分钟一次，可改
  workflow_dispatch:

jobs:
  generate-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 关键修复：指定完整路径
      - name: Generate IPTV.m3u
        run: python py/fofa/txt_to_m3u.py

      - name: Debug files & git status
        run: |
          ls -la
          ls -la py/fofa/
          git status

      - name: Commit and push if changed
        run: |
          set +e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 添加生成的 m3u 文件（指定完整子目录路径）
          git add py/fofa/IPTV.m3u || true
          git add py/fofa/txt_to_m3u.py || true   # 如果脚本本身有变更也加

          # 调试：显示添加后的状态
          echo "Git status after add:"
          git status

          git diff --cached --quiet
          if [ $? -eq 0 ]; then
            echo "⚠️ 无实质变更，跳过提交"
          else
            git commit -m "自动生成 IPTV.m3u $(date '+%Y-%m-%d %H:%M:%S 北京时间')"
            git push origin main || echo "推送失败"
          fi
